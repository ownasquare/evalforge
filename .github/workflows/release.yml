name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Install supported Python versions
        run: uv python install 3.11 3.12

      - name: Verify tag matches the package version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          package_version="$(
            uv run --python 3.11 --no-project python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as project_file:
              print(tomllib.load(project_file)["project"]["version"])
          PY
          )"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}." >&2
            exit 1
          fi

      - name: Install release test dependencies
        run: uv sync --python 3.11 --all-groups --frozen

      - name: Run release and public project contracts
        run: >-
          uv run --python 3.11 --all-groups pytest -q
          tests/contract/test_release_contract.py
          tests/contract/test_project_contract.py
          tests/contract/test_public_project_contract.py

      - name: Build wheel and source distribution
        run: uv build

      - name: Smoke-install release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
          mapfile -t sdists < <(find dist -maxdepth 1 -type f -name '*.tar.gz' -print)
          if [[ "${#wheels[@]}" -ne 1 || "${#sdists[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel and one source distribution." >&2
            exit 1
          fi

          wheel="${wheels[0]}"
          sdist="${sdists[0]}"
          for python_version in 3.11 3.12; do
            smoke_environment="${RUNNER_TEMP}/evalforge-${python_version}"
            uv venv --clear --python "${python_version}" "${smoke_environment}"
            uv pip install --python "${smoke_environment}/bin/python" "${wheel}"
            "${smoke_environment}/bin/evalforge" --help
          done

          sdist_environment="${RUNNER_TEMP}/evalforge-sdist-3.11"
          uv venv --clear --python 3.11 "${sdist_environment}"
          uv pip install --python "${sdist_environment}/bin/python" "${sdist}"
          "${sdist_environment}/bin/evalforge" --help

      - name: Generate deterministic checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 sha256sum > SHA256SUMS
          test -s SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          notes_arguments=()
          if [[ -f "${notes_file}" ]]; then
            notes_arguments+=(--notes-file "${notes_file}")
          else
            notes_arguments+=(--generate-notes)
          fi

          release_arguments=()
          if [[ "${GITHUB_REF_NAME}" == v0.* ]]; then
            release_arguments+=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "EvalForge ${GITHUB_REF_NAME}" \
            "${notes_arguments[@]}" \
            "${release_arguments[@]}" \
            --draft

          gh release upload "${GITHUB_REF_NAME}" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/SHA256SUMS

          gh release edit "${GITHUB_REF_NAME}" --draft=false
