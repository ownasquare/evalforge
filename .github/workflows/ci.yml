name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --all-groups --frozen
      - run: uv run --all-groups alembic upgrade head
      - run: uv run --all-groups ruff check .
      - run: uv run --all-groups ruff format --check .
      - run: uv run --all-groups mypy src
      - run: uv run --all-groups bandit -q -c pyproject.toml -r src
      - run: uv run --all-groups pytest -q --disable-socket --allow-unix-socket --cov=evalforge --cov-branch --cov-report=term-missing --cov-report=xml
      - run: uv run --all-groups pip-audit

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        dockerfile: [Dockerfile.api, Dockerfile.dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: evalforge:${{ matrix.dockerfile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: evalforge
          POSTGRES_USER: evalforge
          POSTGRES_PASSWORD: evalforge-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evalforge -d evalforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      EVALFORGE_ENVIRONMENT: test
      EVALFORGE_DATABASE_URL: postgresql+psycopg://evalforge:evalforge-test@127.0.0.1:5432/evalforge
      EVALFORGE_POSTGRES_TEST_URL: postgresql+psycopg://evalforge:evalforge-test@127.0.0.1:5432/evalforge
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --python "${{ matrix.python-version }}" --all-groups --extra postgres --frozen
      - run: uv run --all-groups --extra postgres alembic upgrade head
      - run: uv run --all-groups --extra postgres alembic check
      - run: uv run --all-groups --extra postgres evalforge seed
      - run: uv run --all-groups --extra postgres evalforge doctor
      - run: uv run --all-groups --extra postgres ruff check tests/integration/test_postgresql.py
      - run: uv run --all-groups --extra postgres pytest -q tests/integration/test_postgresql.py tests/contract/test_project_contract.py tests/contract/test_compose_contract.py

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --all-groups --extra e2e --frozen
      - run: uv run --all-groups --extra e2e playwright install --with-deps chromium
      - run: uv run --all-groups --extra e2e evalforge seed
      - name: Run deterministic browser smoke
        run: |
          uv run --all-groups --extra e2e uvicorn evalforge.api.app:app --host 127.0.0.1 --port 8000 --workers 1 > /tmp/evalforge-api.log 2>&1 &
          uv run --all-groups --extra e2e streamlit run src/evalforge/streamlit_app.py --server.address 127.0.0.1 --server.port 8501 > /tmp/evalforge-ui.log 2>&1 &
          uv run --all-groups --extra e2e python scripts/wait_for_http.py http://127.0.0.1:8000/health/ready
          uv run --all-groups --extra e2e python scripts/wait_for_http.py http://127.0.0.1:8501/_stcore/health
          uv run --all-groups --extra e2e pytest -q -m e2e tests/e2e
