name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --all-groups --frozen
      - run: uv run alembic upgrade head
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run bandit -q -c pyproject.toml -r src
      - run: uv run pytest -q --disable-socket --allow-unix-socket --cov=evalforge --cov-branch --cov-report=term-missing --cov-report=xml
      - run: uv run pip-audit

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        dockerfile: [Dockerfile.api, Dockerfile.dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: evalforge:${{ matrix.dockerfile }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: evalforge
          POSTGRES_USER: evalforge
          POSTGRES_PASSWORD: evalforge-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evalforge -d evalforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      EVALFORGE_ENVIRONMENT: test
      EVALFORGE_DATABASE_URL: postgresql+psycopg://evalforge:evalforge-test@127.0.0.1:5432/evalforge
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --all-groups --extra postgres --frozen
      - run: uv run evalforge seed
      - run: uv run evalforge doctor

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --all-groups --extra e2e --frozen
      - run: uv run playwright install --with-deps chromium
      - run: uv run evalforge seed
      - name: Run deterministic browser smoke
        run: |
          uv run uvicorn evalforge.api.app:app --host 127.0.0.1 --port 8000 --workers 1 > /tmp/evalforge-api.log 2>&1 &
          uv run streamlit run src/evalforge/dashboard/app.py --server.address 127.0.0.1 --server.port 8501 > /tmp/evalforge-ui.log 2>&1 &
          uv run python scripts/wait_for_http.py http://127.0.0.1:8000/health/ready
          uv run python scripts/wait_for_http.py http://127.0.0.1:8501/_stcore/health
          uv run pytest -q -m e2e tests/e2e
