name: Bug report
description: Report a reproducible problem in EvalForge
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve EvalForge. Remove secrets, private prompts, model outputs,
        database files, and unredacted evidence before submitting.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials and private evaluation data.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Tell us what you expected and what happened instead.
      placeholder: I expected ... but ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List the smallest sequence that reproduces the problem.
      placeholder: |
        1. Start the offline demo
        2. Open ...
        3. Select ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.2.0 or commit identifier
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, database, and browser when relevant.
      placeholder: macOS, Python 3.12, SQLite, Chromium
    validations:
      required: true
  - type: textarea
    id: sanitized_output
    attributes:
      label: Sanitized output
      description: Paste only the smallest non-sensitive error or log excerpt.
      render: text
