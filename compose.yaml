name: evalforge

x-identity-environment: &identity-environment
  EVALFORGE_ENVIRONMENT: production
  # Compose uses routable container interfaces, so it deliberately requires OIDC.
  # Zero-configuration local auth remains available only on native loopback bindings.
  EVALFORGE_AUTH_MODE: oidc
  EVALFORGE_OIDC_ISSUER: ${EVALFORGE_OIDC_ISSUER:?set an HTTPS OIDC issuer}
  EVALFORGE_OIDC_AUDIENCE: ${EVALFORGE_OIDC_AUDIENCE:?set the API audience}
  EVALFORGE_OIDC_JWKS_URL: ${EVALFORGE_OIDC_JWKS_URL:?set an HTTPS JWKS URL}
  EVALFORGE_PUBLIC_BASE_URL: ${EVALFORGE_PUBLIC_BASE_URL:?set the HTTPS public API URL}
  EVALFORGE_TRUSTED_HOSTS: ${EVALFORGE_TRUSTED_HOSTS:?set a JSON list including the public API host}
  EVALFORGE_DASHBOARD_OIDC_PROVIDER: ${EVALFORGE_DASHBOARD_OIDC_PROVIDER:-evalforge}

x-api-environment: &api-environment
  <<: *identity-environment
  EVALFORGE_DATABASE_URL: sqlite:////data/evalforge.db
  EVALFORGE_API_HOST: 0.0.0.0
  EVALFORGE_API_PORT: "8000"
  EVALFORGE_CORS_ORIGINS: '["http://127.0.0.1:8501","http://localhost:8501"]'
  EVALFORGE_REAL_RUNS_ENABLED: ${EVALFORGE_REAL_RUNS_ENABLED:-false}
  EVALFORGE_OPENAI_API_KEY: ${EVALFORGE_OPENAI_API_KEY:-}
  EVALFORGE_OPENAI_BASE_URL: ${EVALFORGE_OPENAI_BASE_URL:-https://api.openai.com/v1}
  EVALFORGE_OPENAI_MODEL_ALLOWLIST: ${EVALFORGE_OPENAI_MODEL_ALLOWLIST:-[]}
  EVALFORGE_COMPATIBLE_API_KEY: ${EVALFORGE_COMPATIBLE_API_KEY:-}
  EVALFORGE_COMPATIBLE_BASE_URL: ${EVALFORGE_COMPATIBLE_BASE_URL:-http://127.0.0.1:11434/v1}
  EVALFORGE_COMPATIBLE_MODEL_ALLOWLIST: ${EVALFORGE_COMPATIBLE_MODEL_ALLOWLIST:-[]}
  EVALFORGE_JSON_LOGS: "true"

x-service-security: &service-security
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=256m,mode=1777

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: evalforge-api:local
    restart: unless-stopped
    environment:
      <<: *api-environment
    volumes:
      - evalforge_data:/data
    ports:
      - "127.0.0.1:${EVALFORGE_API_PORT:-8000}:8000"
    <<: *service-security

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: evalforge-dashboard:local
    restart: unless-stopped
    environment:
      <<: *identity-environment
      EVALFORGE_API_URL: ${EVALFORGE_PUBLIC_BASE_URL:?set the HTTPS public API URL}
      EVALFORGE_DASHBOARD_HOST: 0.0.0.0
      EVALFORGE_DASHBOARD_PORT: "8501"
      EVALFORGE_STREAMLIT_AUTH_FILE: /run/secrets/evalforge_streamlit_auth.toml
      HOME: /tmp
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    secrets:
      - source: streamlit_auth
        target: evalforge_streamlit_auth.toml
    ports:
      - "127.0.0.1:${EVALFORGE_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    <<: *service-security

volumes:
  evalforge_data:

secrets:
  streamlit_auth:
    file: ${EVALFORGE_STREAMLIT_AUTH_SOURCE_FILE:?set the host path to the Streamlit OIDC TOML file}
