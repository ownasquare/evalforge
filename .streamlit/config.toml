[theme]
primaryColor = "#6366F1"
backgroundColor = "#F7F8FC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#172033"
font = "sans-serif"
baseRadius = "large"

[server]
headless = true
maxUploadSize = 10
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = "none"
toolbarMode = "minimal"
