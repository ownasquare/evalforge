[theme]
primaryColor = "#255F7A"
backgroundColor = "#F5F6F4"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#18201C"
font = "sans-serif"
baseRadius = "small"

[server]
headless = true
maxUploadSize = 10
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = "none"
toolbarMode = "minimal"
